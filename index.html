<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>202 班級座位產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.2.2/build/index.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
:root{--primary:#1a73e8;--green:#0b8043;--orange:#e37400;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Microsoft JhengHei",sans-serif;padding:16px;background:#f0f2f5;color:#333;}
.container{max-width:900px;margin:auto;background:white;padding:24px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
h1{text-align:center;color:var(--primary);margin-bottom:20px;font-size:20px;}
.section{background:#f8f9fa;padding:16px;border-radius:8px;margin-bottom:14px;border:1px solid #e0e0e0;}
.section-title{font-weight:bold;margin-bottom:10px;color:#444;border-bottom:2px solid #ddd;padding-bottom:4px;font-size:14px;}
.upload-area{border:2px dashed var(--primary);padding:12px;text-align:center;background:#e8f0fe;cursor:pointer;border-radius:8px;margin-bottom:8px;font-size:13px;}
.history-item{display:flex;justify-content:space-between;background:white;padding:6px 10px;margin-bottom:4px;border-radius:4px;border:1px solid #ddd;align-items:center;font-size:13px;}
.btn-del{color:#d93025;cursor:pointer;font-size:12px;border:1px solid #d93025;padding:2px 7px;border-radius:4px;}
.fix-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
.fix-form input,.fix-form select{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:inherit;}
.fix-form input{width:140px;}
.fix-form select{width:110px;}
.fix-form button{padding:6px 14px;font-size:13px;background:var(--green);color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.fixed-entry{display:flex;align-items:center;gap:8px;background:white;padding:5px 10px;margin-bottom:4px;border-radius:6px;border:1px solid #a8d5b5;font-size:13px;}
.fixed-entry .loc{color:#0b8043;background:#e6f4ea;padding:2px 8px;border-radius:10px;font-size:12px;}
.fixed-entry .rm{margin-left:auto;color:#d93025;cursor:pointer;font-size:12px;border:1px solid #d93025;padding:2px 7px;border-radius:4px;}
.no-fixed{color:#999;font-size:13px;font-style:italic;}
.chart-outer{overflow-x:auto;margin:16px 0;}
.chart-wrap{display:inline-flex;flex-direction:column;align-items:flex-start;}
.col-header{display:flex;margin-bottom:4px;}
.col-header-spacer{width:48px;flex-shrink:0;}
.col-label{width:82px;flex-shrink:0;text-align:center;font-size:11px;color:#999;font-weight:bold;}
.seat-row{display:flex;align-items:center;margin-bottom:6px;}
.row-label{width:48px;flex-shrink:0;text-align:center;font-size:11px;color:#999;font-weight:bold;line-height:1.3;}
.cell{width:82px;height:70px;border:2px solid #ddd;display:flex;flex-direction:column;justify-content:center;align-items:center;background:white;border-radius:6px;position:relative;transition:border-color .15s,background .15s;flex-shrink:0;margin-right:6px;}
.cell:last-child{margin-right:0;}
.cell.clickable{cursor:pointer;}
.cell.clickable:hover{border-color:var(--primary);background:#e8f0fe;}
.cell.empty-slot{background:#f5f5f5;border:2px dashed #e0e0e0;}
.cell.blank{border-color:#e8e8e8;background:#fafafa;}
.cell .coord{font-size:10px;color:#ccc;user-select:none;}
.cell .sid{font-size:11px;color:#888;}
.cell .name{font-size:15px;font-weight:bold;color:#222;}
.cell.fixed-cell{border:2px solid var(--green);background:#e6f4ea;}
.cell.sel1{border:2.5px solid var(--orange);background:#fff3e0;}
.badge{display:none;position:absolute;top:2px;right:3px;font-size:9px;padding:1px 4px;border-radius:3px;color:white;}
.cell.fixed-cell .fix-b{display:block;background:var(--green);}
.cell.sel1 .sel-b{display:block;background:var(--orange);}
.podium{width:180px;margin:4px auto 16px;padding:8px;border:3px solid #333;text-align:center;font-weight:bold;font-size:16px;letter-spacing:8px;background:white;border-radius:4px;}
.direction-note{text-align:center;font-size:12px;color:#aaa;margin-bottom:4px;}
.btn-group{text-align:center;margin:12px 0;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
button.main{padding:10px 20px;font-size:14px;font-weight:bold;border:none;border-radius:6px;cursor:pointer;}
.btn-primary{background:var(--primary);color:white;}
.btn-success{background:#28a745;color:white;}
.swap-section{display:none;}
.swap-section.visible{display:block;}
.hint{font-size:13px;padding:7px 12px;border-radius:6px;background:#fff3e0;color:#7a4f00;border:1px solid #f4a93a;display:inline-block;}
label{font-size:13px;}
@media print{.section,.btn-group,.upload-area,.btn-del,.swap-section,.direction-note{display:none!important;}}
</style>
</head>
<body>
<div class="container">
<h1>202 班級座位隨機產生器</h1>

<div class="section">
  <div class="section-title">Step 1. 匯入歷史座位資料</div>
  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    📁 點擊此處上傳過去的座位表 (.docx)
    <input type="file" id="fileInput" accept=".docx" style="display:none" multiple onchange="handleFiles(this)">
  </div>
  <div id="historyContainer"></div>
</div>

<div class="section">
  <div class="section-title">Step 2. 換座位規則設定</div>
  <label><input type="checkbox" id="checkPos" checked> 1. 新位置不與「歷史紀錄」重複（建議 8 筆內）</label><br>
  <label style="margin-top:8px;display:inline-block;">
    <input type="checkbox" id="checkNeighborLR"> 2. 左右鄰居（隔壁排同位）不與「歷史紀錄」重複
    <select id="neighborLRScope" style="margin-left:6px;padding:3px 6px;border:1px solid #ccc;border-radius:4px;font-size:12px;">
      <option value="all">所有紀錄</option>
      <option value="last">前一次紀錄</option>
    </select>
  </label><br>
  <label style="margin-top:8px;display:inline-block;">
    <input type="checkbox" id="checkNeighborCross"> 3. 前後左右鄰居（十字形）不與「歷史紀錄」重複
    <select id="neighborCrossScope" style="margin-left:6px;padding:3px 6px;border:1px solid #ccc;border-radius:4px;font-size:12px;">
      <option value="all">所有紀錄</option>
      <option value="last">前一次紀錄</option>
    </select>
  </label>
  <div style="font-size:12px;color:#aaa;margin-top:8px;">※ 規則2和規則3只需勾選一個，同時勾選以規則3（範圍較大）為準。</div>
</div>

<div class="section">
  <div class="section-title">Step 3. 固定座位設定（參考下方座位表的排-位編號）</div>
  <div class="fix-form">
    <input type="text" id="fixName" placeholder="姓名（與座位表一致）"/>
    <select id="fixCol">
      <option value="">選排（左右）</option>
      <option value="0">第1排（最右）</option>
      <option value="1">第2排</option>
      <option value="2">第3排</option>
      <option value="3">第4排</option>
      <option value="4">第5排</option>
      <option value="5">第6排</option>
      <option value="6">第7排（最左）</option>
    </select>
    <select id="fixRow">
      <option value="">選位（前後）</option>
      <option value="0">第1位（最前）</option>
      <option value="1">第2位</option>
      <option value="2">第3位</option>
      <option value="3">第4位</option>
      <option value="4">第5位</option>
      <option value="5">第6位（最後）</option>
    </select>
    <button onclick="addFixed()">＋ 新增</button>
  </div>
  <div style="font-size:12px;color:#888;margin-bottom:8px;">※ 第7排第1位、第7排第6位為空位，無法固定。</div>
  <div id="fixedListContainer"><div class="no-fixed">尚未設定固定座位</div></div>
</div>

<div class="btn-group" style="margin-bottom:0;">
  <button class="main btn-primary" onclick="generateSeats()">🎲 產生新座位</button>
</div>

<div class="direction-note" style="margin-top:16px;">← 第7排（最左）　　　　第1排（最右）→</div>
<div class="chart-outer">
  <div class="chart-wrap">
    <div class="col-header" id="colHeader"></div>
    <div id="chartGrid"></div>
  </div>
</div>
<div class="direction-note">↑ 第1位（靠講台・最前）</div>
<div class="podium">講　臺</div>

<div class="section swap-section" id="swapSection">
  <div class="section-title">Step 4. 手動對換（點選兩個座位來互換）</div>
  <span class="hint" id="swapHint">點選第一個要對換的座位</span>
</div>

<div class="btn-group">
  <button class="main btn-success" id="downloadBtn" onclick="exportToWord()" disabled>📥 下載 Word</button>
</div>
</div>

<script>
/*
  座標系統（老師視角）：
  col 0..6 = 第1排(右)..第7排(左)
  row 0..5 = 第1位(前・靠講台)..第6位(後)
  空位：col=6 且 (row=0 或 row=5)

  鄰居定義：
  - 左右：col±1，row 相同（隔壁排同位）
  - 前後左右（十字）：col±1 row 相同，加上 row±1 col 相同
*/
const ROWS=6, COLS=7;
function isNull(r,c){ return c===6&&(r===0||r===5); }

let historyRecords=[],studentPool=[],currentMatrix=null;
let fixedRules=[],firstSelected=null,generated=false;

window.onload=()=>{buildHeader();renderChart(null);};

function buildHeader(){
  const hdr=document.getElementById('colHeader');
  hdr.innerHTML='<div class="col-header-spacer"></div>';
  for(let c=COLS-1;c>=0;c--){
    const d=document.createElement('div');
    d.className='col-label';
    d.textContent=`第${c+1}排`;
    hdr.appendChild(d);
  }
}

function renderChart(matrix){
  const grid=document.getElementById('chartGrid');
  grid.innerHTML='';
  const fixedSet=new Set(fixedRules.map(f=>`${f.row},${f.col}`));
  for(let r=ROWS-1;r>=0;r--){
    const rowDiv=document.createElement('div');
    rowDiv.className='seat-row';
    const rl=document.createElement('div');
    rl.className='row-label';
    rl.textContent=`第${r+1}位`;
    rowDiv.appendChild(rl);
    for(let c=COLS-1;c>=0;c--){
      const div=document.createElement('div');
      const nil=isNull(r,c);
      const fixed=fixedSet.has(`${r},${c}`);
      const s=matrix?matrix[r][c]:null;
      if(nil){
        div.className='cell empty-slot';
      } else if(fixed&&!matrix){
        const rule=fixedRules.find(f=>f.row===r&&f.col===c);
        div.className='cell fixed-cell';
        div.innerHTML=`<span class="badge fix-b">固定</span><div class="coord">${c+1}-${r+1}</div><div class="name" style="font-size:13px">${rule.name}</div>`;
      } else if(matrix&&s){
        div.className='cell'+(fixed?' fixed-cell':'');
        if(generated) div.classList.add('clickable');
        div.innerHTML=`<span class="badge fix-b">固定</span><span class="badge sel-b">已選</span><div class="sid">${s.id}</div><div class="name">${s.name}</div>`;
        if(generated){const _r=r,_c=c,_s=s;div.addEventListener('click',()=>handleCellClick(div,_r,_c,_s));}
      } else {
        div.className='cell blank';
        div.innerHTML=`<div class="coord">${c+1}-${r+1}</div>`;
      }
      rowDiv.appendChild(div);
    }
    grid.appendChild(rowDiv);
  }
}

/* ── 固定規則 ── */
function addFixed(){
  const name=document.getElementById('fixName').value.trim();
  const cv=document.getElementById('fixCol').value;
  const rv=document.getElementById('fixRow').value;
  if(!name) return alert('請輸入姓名');
  if(cv==='') return alert('請選擇排');
  if(rv==='') return alert('請選擇位');
  const ci=parseInt(cv),ri=parseInt(rv);
  if(isNull(ri,ci)) return alert('該位置是空位，無法固定');
  if(fixedRules.find(f=>f.name===name)) return alert(`「${name}」已設定固定`);
  if(fixedRules.find(f=>f.row===ri&&f.col===ci)) return alert('該位置已被其他人固定');
  fixedRules.push({name,row:ri,col:ci});
  document.getElementById('fixName').value='';
  document.getElementById('fixCol').value='';
  document.getElementById('fixRow').value='';
  renderFixedList();renderChart(currentMatrix);
}
function removeFixed(i){fixedRules.splice(i,1);renderFixedList();renderChart(currentMatrix);}
function renderFixedList(){
  const c=document.getElementById('fixedListContainer');
  if(!fixedRules.length){c.innerHTML='<div class="no-fixed">尚未設定固定座位</div>';return;}
  c.innerHTML=fixedRules.map((f,i)=>`
    <div class="fixed-entry">
      <span>📌 <b>${f.name}</b></span>
      <span class="loc">第${f.col+1}排 第${f.row+1}位</span>
      <span class="rm" onclick="removeFixed(${i})">移除</span>
    </div>`).join('');
}

/* ── 歷史資料 ── */
async function handleFiles(input){
  for(const file of Array.from(input.files)){
    const ab=await file.arrayBuffer();
    const result=await mammoth.convertToHtml({arrayBuffer:ab});
    parseDocx(result.value,file.name);
  }
  input.value='';
}
function parseDocx(html,filename){
  const div=document.createElement('div');div.innerHTML=html;
  const table=div.querySelector('table');if(!table)return;
  const trs=Array.from(table.querySelectorAll('tr'));
  const matrix=[];
  for(let r=0;r<ROWS;r++){matrix[r]=[];for(let c=0;c<COLS;c++)matrix[r][c]=null;}
  const students=[];
  trs.forEach((tr,ti)=>{
    Array.from(tr.querySelectorAll('td')).forEach((td,ci)=>{
      const text=td.innerText.trim();
      const sr=ROWS-1-ti,sc=COLS-1-ci;
      if(sr<0||sr>=ROWS||sc<0||sc>=COLS) return;
      if(!text||text==='null'||isNull(sr,sc)) return;
      const m=text.match(/^(\d+)\s*(.*)$/);
      const s=m?{id:m[1],name:m[2].trim()}:{id:'?',name:text};
      matrix[sr][sc]=s;students.push(s);
    });
  });
  historyRecords.push({filename,matrix});
  studentPool=students;
  updateHistoryUI();
  currentMatrix=matrix;generated=false;
  renderChart(currentMatrix);
  document.getElementById('downloadBtn').disabled=false;
}
function updateHistoryUI(){
  const c=document.getElementById('historyContainer');
  c.innerHTML=historyRecords.map((rec,i)=>`
    <div class="history-item"><span>📄 ${rec.filename}</span><span class="btn-del" onclick="removeHistory(${i})">移除</span></div>`).join('');
}
function removeHistory(i){historyRecords.splice(i,1);updateHistoryUI();}

/* ── 對換 ── */
function handleCellClick(div,r,c,s){
  if(!currentMatrix||!s)return;
  if(!firstSelected){
    firstSelected={r,c};
    div.classList.add('sel1');
    document.getElementById('swapHint').textContent=`已選「${s.name}」，再點另一個座位對換`;
  } else {
    if(firstSelected.r===r&&firstSelected.c===c){
      div.classList.remove('sel1');firstSelected=null;
      document.getElementById('swapHint').textContent='點選第一個要對換的座位';return;
    }
    const a=firstSelected,b={r,c};
    const tmp=currentMatrix[a.r][a.c];
    currentMatrix[a.r][a.c]=currentMatrix[b.r][b.c];
    currentMatrix[b.r][b.c]=tmp;
    firstSelected=null;
    renderChart(currentMatrix);
    document.getElementById('swapHint').textContent='對換完成！可繼續調整。';
  }
}

/* ── 鄰居取得 ── */
// 左右：隔壁排同位 (col±1, row 相同)
function getNeighborsLR(r,c){
  const nb=[];
  if(c>0) nb.push({r,c:c-1});
  if(c<COLS-1) nb.push({r,c:c+1});
  return nb;
}
// 前後左右：左右 + 前後 (row±1, col 相同)
function getNeighborsCross(r,c){
  const nb=getNeighborsLR(r,c);
  if(r>0) nb.push({r:r-1,c});
  if(r<ROWS-1) nb.push({r:r+1,c});
  return nb;
}

// 檢查 n1 和 n2 在某筆歷史紀錄裡是否為鄰居（依模式）
function wereNeighbors(n1,n2,matrix,mode){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!matrix[r]||!matrix[r][c]||matrix[r][c].name!==n1) continue;
    const nbs=mode==='cross'?getNeighborsCross(r,c):getNeighborsLR(r,c);
    for(const{r:nr,c:nc} of nbs)
      if(matrix[nr]&&matrix[nr][nc]&&matrix[nr][nc].name===n2) return true;
  }
  return false;
}

/* ── 產生座位（回溯 + MRV + 剪枝） ── */
function generateSeats(){
  if(!studentPool.length) return alert('請先匯入座位表作為名單參考！');
  for(const f of fixedRules)
    if(!studentPool.find(s=>s.name===f.name))
      return alert(`找不到學生「${f.name}」，請確認姓名與座位表一致。`);

  const optPos=document.getElementById('checkPos').checked;
  const optLR=document.getElementById('checkNeighborLR').checked;
  const optCross=document.getElementById('checkNeighborCross').checked;
  const scopeLR=document.getElementById('neighborLRScope').value;   // 'all' or 'last'
  const scopeCross=document.getElementById('neighborCrossScope').value;

  // 鄰居模式：cross 優先（範圍含 LR）
  const neighborMode=optCross?'cross':optLR?'lr':null;
  const neighborScope=optCross?scopeCross:optLR?scopeLR:null;

  // 固定座位
  const fixedPosMap={};
  const fixedNameSet=new Set();
  for(const f of fixedRules){
    fixedPosMap[`${f.row},${f.col}`]=studentPool.find(s=>s.name===f.name);
    fixedNameSet.add(f.name);
  }

  const freeStudents=studentPool.filter(s=>!fixedNameSet.has(s.name));
  const freeSeats=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
    if(!isNull(r,c)&&!fixedPosMap[`${r},${c}`]) freeSeats.push({r,c});

  // Step 1：為每位學生建立可用座位清單（排除歷史位置）
  const candidates=freeStudents.map(s=>{
    let seats=[...freeSeats];
    if(optPos){
      seats=seats.filter(({r,c})=>{
        for(const rec of historyRecords)
          if(rec.matrix[r]&&rec.matrix[r][c]&&rec.matrix[r][c].name===s.name) return false;
        return true;
      });
    }
    return {s,seats};
  });

  // Step 2：MRV 排序（可用位置少的優先），同數量隨機打亂
  candidates.sort((a,b)=>{
    if(a.seats.length!==b.seats.length) return a.seats.length-b.seats.length;
    return Math.random()-0.5;
  });

  // 初始化結果矩陣
  const result=[];
  for(let r=0;r<ROWS;r++){result[r]=[];for(let c=0;c<COLS;c++)result[r][c]=null;}
  for(const key in fixedPosMap){const[r,c]=key.split(',').map(Number);result[r][c]=fixedPosMap[key];}

  const usedSeats=new Set(Object.keys(fixedPosMap));

  // 鄰居衝突檢查
  function checkNeighbor(s,r,c){
    if(!neighborMode) return true;
    const nbs=neighborMode==='cross'?getNeighborsCross(r,c):getNeighborsLR(r,c);
    const recsToCheck=neighborScope==='last'
      ?( historyRecords.length>0?[historyRecords[historyRecords.length-1]]:[] )
      :historyRecords;

    // 檢查當前矩陣中已就坐的鄰居：他們不能和 s 曾是鄰居
    for(const{r:nr,c:nc} of nbs){
      const seated=result[nr]&&result[nr][nc];
      if(!seated) continue;
      for(const rec of recsToCheck)
        if(wereNeighbors(s.name,seated.name,rec.matrix,neighborMode)) return false;
    }
    return true;
  }

  // Step 3：回溯
  function backtrack(idx){
    if(idx===candidates.length) return true;
    const{s,seats}=candidates[idx];
    const available=seats
      .filter(({r,c})=>!usedSeats.has(`${r},${c}`))
      .sort(()=>Math.random()-0.5);

    for(const{r,c} of available){
      if(!checkNeighbor(s,r,c)) continue;
      result[r][c]=s;
      usedSeats.add(`${r},${c}`);
      if(backtrack(idx+1)) return true;
      result[r][c]=null;
      usedSeats.delete(`${r},${c}`);
    }
    return false;
  }

  const success=backtrack(0);

  if(success){
    currentMatrix=result;generated=true;firstSelected=null;
    renderChart(currentMatrix);
    document.getElementById('swapSection').classList.add('visible');
    document.getElementById('downloadBtn').disabled=false;
    document.getElementById('swapHint').textContent='點選第一個要對換的座位';
  } else {
    alert('【真的無解】\n\n系統已窮舉所有可能的排列，確認在目前規則下無法排出合法座位。\n\n💡 建議：\n1. 移除較舊的座位紀錄\n2. 取消部分勾選的規則\n3. 減少固定座位人數');
  }
}

/* ── 匯出 Word ── */
function exportToWord(){
  if(!currentMatrix)return;
  const{Document,Table,TableRow,TableCell,Paragraph,TextRun,AlignmentType,WidthType,BorderStyle,VerticalAlign,Packer}=window.docx;
  const tableRows=[];
  for(let ti=0;ti<ROWS;ti++){
    const sr=ROWS-1-ti;
    const cells=[];
    for(let ci=0;ci<COLS;ci++){
      const sc=COLS-1-ci;
      const cell=currentMatrix[sr][sc];
      const nil=isNull(sr,sc);
      cells.push(new TableCell({
        width:{size:100/COLS,type:WidthType.PERCENTAGE},
        verticalAlign:VerticalAlign.CENTER,
        borders:nil?{top:{style:BorderStyle.DASHED,size:1,color:'CCCCCC'},bottom:{style:BorderStyle.DASHED,size:1,color:'CCCCCC'},left:{style:BorderStyle.DASHED,size:1,color:'CCCCCC'},right:{style:BorderStyle.DASHED,size:1,color:'CCCCCC'}}:{},
        children:cell?[
          new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:String(cell.id),size:28,color:'666666'})]}),
          new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:cell.name,size:28})]})
        ]:[new Paragraph('')]
      }));
    }
    tableRows.push(new TableRow({children:cells,height:{value:800,rule:'atLeast'}}));
  }
  const doc=new Document({sections:[{children:[
    new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:'202 座位表',size:48})]}),
    new Paragraph(''),
    new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:tableRows}),
    new Paragraph(''),
    new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:'—— 講 臺 ——',size:32})]})
  ]}]});
  Packer.toBlob(doc).then(blob=>saveAs(blob,'202新座位表.docx'));
}
</script>
